[thorwatch]
# SQLite database and retention.
database = /var/lib/thorwatch/thorwatch.db
retention_days = 14

# Lightweight baseline collection. During an event, burst_interval is used.
normal_interval = 15
burst_interval = 2

# Realtime dashboard process data. When enabled, the collector wakes at the
# shorter of normal_interval and live_process_interval outside load events.
live_processes_enabled = true
live_process_interval = 5
live_process_limit = 20
live_process_cpu_threshold = 0.5

# Tune load_threshold to the server's CPU count and normal baseline. The default
# is intended for larger shared-hosting servers and should be reviewed after install.
load_threshold = 20
cpu_busy_threshold = 25
burst_hold_seconds = 180
max_event_seconds = 3600

# Detailed process sampling is enabled only while an event is open.
top_process_limit = 60
process_cpu_threshold = 2

# cPanel/LiteSpeed access-log correlation for cPanel users seen running PHP.
access_logs_enabled = true
access_log_root = /usr/local/apache/domlogs
access_log_interval = 10
access_log_pretrigger_bytes = 262144
access_log_read_limit_bytes = 4194304
access_log_global_limit_bytes = 16777216
http_unique_limit = 5000
strip_query_strings = false

# On-demand MariaDB user tracking. Thor Watch enables the dynamic userstat
# variable only for this window and restores its previous state afterward.
# Leave mysql_client empty to auto-detect /usr/bin/mariadb or /usr/bin/mysql.
mysql_client =
mysql_tracking_duration = 60
mysql_tracking_limit = 10

# Optional event-closed email. Examples: root or admin@example.com
email_on_close = false
alert_email =
