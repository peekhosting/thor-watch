name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: ./tests/run.sh
      - name: Validate dashboard JavaScript
        run: |
          python3 -c "import importlib.machinery; m=importlib.machinery.SourceFileLoader('twcgi','src/thorwatch.cgi').load_module(); print(m.LIVE_JS)" | node --check
